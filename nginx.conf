# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security: Hide nginx version
    server_tokens off;

    # Custom error pages (hide nginx version info)
    error_page 400 401 403 404 405 408 413 414 429 500 502 503 504 /error.html;

    # Proxy /api/* → Backend with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for protection
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Strict rate limiting for upload endpoints
    location /api/slips/upload {
        limit_req zone=upload_limit burst=3 nodelay;
        limit_conn conn_limit 5;
        
        proxy_pass http://backend:8000/api/slips/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy /health → Backend health check
    location /health {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://backend:8000/health;
    }

    # Serve React app (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Custom error page location
    location = /error.html {
        internal;
        return 200 '<!DOCTYPE html><html><head><title>Error</title><style>body{font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#0f172a;color:#e2e8f0;}</style></head><body><div style="text-align:center;"><h1>⚠️ ระบบไม่พร้อมใช้งาน</h1><p>ขออภัย ระบบกำลังประสบปัญหา กรุณาลองใหม่ภายหลัง</p><p><small>SlipScan Service</small></p></div></body></html>';
        add_header Content-Type text/html;
    }
}
