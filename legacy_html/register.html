<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlipScan — สมัครสมาชิก</title>
    <meta name="description" content="SlipScan - สมัครสมาชิกเพื่อใช้งานระบบตรวจสอบสลิป" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #4f46e5;
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp .5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .75rem;
            margin-bottom: 1.75rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: .875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 70, 229, .5);
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #818cf8;
        }

        .card-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, .55);
            font-size: .9rem;
            margin-bottom: 2rem;
        }

        .form-label {
            color: rgba(255, 255, 255, .8);
            font-size: .85rem;
            font-weight: 500;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid var(--border) !important;
            border-radius: .75rem !important;
            color: #fff !important;
            padding: .75rem 1rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, .3);
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .25) !important;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid var(--border) !important;
            border-right: none !important;
            color: rgba(255, 255, 255, .5) !important;
            border-radius: .75rem 0 0 .75rem !important;
        }

        .input-group .form-control {
            border-left: none !important;
            border-radius: 0 .75rem .75rem 0 !important;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border: none;
            border-radius: .75rem;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            padding: .8rem;
            width: 100%;
            transition: transform .15s, box-shadow .15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, .4);
            cursor: pointer;
        }

        .btn-register:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, .5);
        }

        .btn-register:disabled {
            opacity: .7;
        }

        .divider {
            border-color: var(--border);
            margin: 1.5rem 0;
        }

        .login-link {
            text-align: center;
            color: rgba(255, 255, 255, .55);
            font-size: .875rem;
        }

        .login-link a {
            color: #818cf8;
            font-weight: 500;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert-custom {
            border-radius: .75rem;
            font-size: .875rem;
            padding: .75rem 1rem;
            display: none;
        }

        .alert-danger-custom {
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .4);
            color: #fca5a5;
        }

        .alert-success-custom {
            background: rgba(34, 197, 94, .15);
            border: 1px solid rgba(34, 197, 94, .4);
            color: #86efac;
        }

        /* Password strength bar */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            margin-top: .4rem;
            transition: width .3s, background .3s;
            width: 0;
        }

        .strength-text {
            font-size: .75rem;
            color: rgba(255, 255, 255, .4);
            margin-top: .2rem;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <div class="logo-wrapper">
            <div class="logo-icon"><i class="bi bi-receipt-cutoff"></i></div>
            <div class="logo-text">Slip<span>Scan</span></div>
        </div>
        <p class="card-subtitle">สร้างบัญชีใหม่เพื่อเริ่มใช้งาน</p>

        <div id="alertBox" class="alert-custom" role="alert"></div>

        <form id="registerForm" novalidate>
            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">อีเมล</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com"
                        autocomplete="email" required />
                </div>
            </div>

            <!-- Password -->
            <div class="mb-1">
                <label for="password" class="form-label">รหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="อย่างน้อย 8 ตัวอักษร"
                        autocomplete="new-password" required />
                </div>
            </div>
            <div class="strength-bar" id="strengthBar"></div>
            <div class="strength-text" id="strengthText"></div>

            <!-- Confirm Password -->
            <div class="mb-4 mt-3">
                <label for="confirmPassword" class="form-label">ยืนยันรหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="พิมพ์รหัสผ่านอีกครั้ง"
                        autocomplete="new-password" required />
                </div>
            </div>

            <button type="submit" id="registerBtn" class="btn-register">
                <span id="btnText"><i class="bi bi-person-plus me-2"></i>สมัครสมาชิก</span>
                <span id="btnSpinner" class="d-none">
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>กำลังสมัคร...
                </span>
            </button>
        </form>

        <hr class="divider" />
        <p class="login-link">มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://slipscan-backend.onrender.com'; // เปลี่ยนเป็น URL ของ Backend ตอนเอาขึ้นเซิร์ฟเวอร์จริง

        const form = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');
        const registerBtn = document.getElementById('registerBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        // Redirect if already logged in
        if (sessionStorage.getItem('slipscan_token')) {
            window.location.href = 'dashboard.html';
        }

        // ── Password strength ──────────────────────────────────────────────────
        document.getElementById('password').addEventListener('input', function () {
            const val = this.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { w: '15%', bg: '#ef4444', label: 'อ่อนมาก' },
                { w: '35%', bg: '#f97316', label: 'อ่อน' },
                { w: '60%', bg: '#eab308', label: 'ปานกลาง' },
                { w: '85%', bg: '#22c55e', label: 'แข็งแรง' },
                { w: '100%', bg: '#15803d', label: 'แข็งแรงมาก' },
            ];
            if (val.length === 0) { strengthBar.style.width = '0'; strengthText.textContent = ''; return; }
            const lvl = levels[score] || levels[0];
            strengthBar.style.width = lvl.w;
            strengthBar.style.background = lvl.bg;
            strengthText.textContent = `ความปลอดภัย: ${lvl.label}`;
        });

        // ── Helpers ────────────────────────────────────────────────────────────
        function showAlert(type, msg) {
            alertBox.className = `alert-custom ${type === 'error' ? 'alert-danger-custom' : 'alert-success-custom'}`;
            alertBox.textContent = msg;
            alertBox.style.display = 'block';
        }
        function setLoading(on) {
            registerBtn.disabled = on;
            btnText.classList.toggle('d-none', on);
            btnSpinner.classList.toggle('d-none', !on);
        }

        // ── Submit ─────────────────────────────────────────────────────────────
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!email || !pass) { showAlert('error', 'กรุณากรอกข้อมูลให้ครบ'); return; }
            if (pass.length < 8) { showAlert('error', 'รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
            if (pass !== confirm) { showAlert('error', 'รหัสผ่านไม่ตรงกัน'); return; }

            setLoading(true);
            try {
                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    showAlert('success', 'สมัครสมาชิกสำเร็จ! กำลังพาไปหน้า Login...');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                } else {
                    showAlert('error', data.message || 'สมัครสมาชิกไม่สำเร็จ');
                }
            } catch (err) {
                showAlert('error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
