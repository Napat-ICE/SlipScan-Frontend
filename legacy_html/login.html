<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlipScan — เข้าสู่ระบบ</title>
    <meta name="description" content="SlipScan - ระบบตรวจสอบสลิปโอนเงินด้วย AI" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dk: #3730a3;
            --surface: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* ── Card ── */
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Logo ── */
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .75rem;
            margin-bottom: 1.75rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: .875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            box-shadow: 0 4px 16px rgba(79, 70, 229, .5);
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #818cf8;
        }

        /* ── Typography ── */
        .card-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, .55);
            font-size: .9rem;
            margin-bottom: 2rem;
        }

        /* ── Form ── */
        .form-label {
            color: rgba(255, 255, 255, .8);
            font-size: .85rem;
            font-weight: 500;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid var(--border) !important;
            border-radius: .75rem !important;
            color: #fff !important;
            padding: .75rem 1rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, .3);
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .25) !important;
            outline: none;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.07) !important;
            border: 1px solid var(--border) !important;
            border-right: none !important;
            color: rgba(255, 255, 255, .5) !important;
            border-radius: .75rem 0 0 .75rem !important;
        }

        .input-group .form-control {
            border-left: none !important;
            border-radius: 0 .75rem .75rem 0 !important;
        }

        /* ── Button ── */
        .btn-login {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border: none;
            border-radius: .75rem;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            padding: .8rem;
            width: 100%;
            transition: transform .15s, box-shadow .15s;
            box-shadow: 0 4px 16px rgba(79, 70, 229, .4);
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 70, 229, .5);
            color: #fff;
        }

        .btn-login:disabled {
            opacity: .7;
            transform: none;
        }

        /* ── Divider ── */
        .divider {
            border-color: var(--border);
            margin: 1.5rem 0;
        }

        /* ── Register link ── */
        .register-link {
            text-align: center;
            color: rgba(255, 255, 255, .55);
            font-size: .875rem;
        }

        .register-link a {
            color: #818cf8;
            font-weight: 500;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* ── Alert ── */
        .alert-custom {
            border-radius: .75rem;
            font-size: .875rem;
            padding: .75rem 1rem;
            display: none;
        }

        .alert-danger-custom {
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .4);
            color: #fca5a5;
        }

        .alert-success-custom {
            background: rgba(34, 197, 94, .15);
            border: 1px solid rgba(34, 197, 94, .4);
            color: #86efac;
        }

        /* ── Spinner ── */
        .spinner-sm {
            width: 1rem;
            height: 1rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Logo -->
        <div class="logo-wrapper">
            <div class="logo-icon"><i class="bi bi-receipt-cutoff"></i></div>
            <div class="logo-text">Slip<span>Scan</span></div>
        </div>

        <p class="card-subtitle">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>

        <!-- Alert -->
        <div id="alertBox" class="alert-custom" role="alert"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">อีเมล</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="example@email.com"
                        autocomplete="email" required />
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="form-label">รหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••"
                        autocomplete="current-password" required />
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="loginBtn" class="btn-login">
                <span id="btnText">เข้าสู่ระบบ</span>
                <span id="btnSpinner" class="d-none">
                    <span class="spinner-border spinner-sm me-2" role="status"></span>กำลังเข้าสู่ระบบ...
                </span>
            </button>
        </form>

        <hr class="divider" />

        <p class="register-link">
            ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
        </p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://slipscan-backend.onrender.com'; // เปลี่ยนเป็น URL ของ Backend ตอนเอาขึ้นเซิร์ฟเวอร์จริง

        const form = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const loginBtn = document.getElementById('loginBtn');

        // Redirect if already logged in
        if (sessionStorage.getItem('slipscan_token')) {
            window.location.href = 'dashboard.html';
        }

        function showAlert(type, msg) {
            alertBox.className = `alert-custom ${type === 'error' ? 'alert-danger-custom' : 'alert-success-custom'}`;
            alertBox.textContent = msg;
            alertBox.style.display = 'block';
        }
        function hideAlert() { alertBox.style.display = 'none'; }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            btnText.classList.toggle('d-none', loading);
            btnSpinner.classList.toggle('d-none', !loading);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('error', 'กรุณากรอกอีเมลและรหัสผ่าน');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.setItem('slipscan_token', data.token);
                    sessionStorage.setItem('slipscan_user', JSON.stringify(data.user));
                    showAlert('success', 'เข้าสู่ระบบสำเร็จ! กำลังพาไปยังหน้าหลัก...');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showAlert('error', data.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (err) {
                showAlert('error', 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง');
                console.error(err);
            } finally {
                setLoading(false);
            }
        });
    </script>

</body>

</html>
